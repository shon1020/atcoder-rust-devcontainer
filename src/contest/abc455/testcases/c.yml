---
type: Batch
timelimit: ~
match: Lines

cases:
  - name: sample1
    in: |
      6 2
      7 2 7 2 2 9
    out: |
      6
  - name: sample2
    in: |
      8 6
      1 2 3 4 1 2 3 4
    out: |
      0
  - name: sample3
    in: |
      10 2
      3 3 4 1 1 3 3 1 5 1
    out: |
      8

extend:
  - type: Text
    path: "./c"
    in: /in/*.txt
    out: /out/*.txt
