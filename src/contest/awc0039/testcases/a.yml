    in: |
      10 4 5
      2 b
      5 e
      7 g
      10 z
      abcdefghiz
      xbxdexgxxz
      abcdeagxyz
      xbxdexhxxz
      abcdefghij
    out: |
      Yes
      Yes
      Yes
      No
      No

extend:
