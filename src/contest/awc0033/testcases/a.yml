---
type: Batch
timelimit: 2s
match: Lines

cases:
  - name: sample1
    in: |
      5 2
      10100
      01010
    out: |
      2
  - name: sample2
    in: |
      5 3
      11001
      10011
    out: |
      0
  - name: sample3
    in: |
      20 5
      11111111110000000000
      11111000001111100000
    out: |
      5
  - name: sample4
    in: |
      50 10
      11010011100101101001110010011101010011100101101001
      00101100011010010110001101100010101100011010010110
    out: |
      40
  - name: sample5
    in: |
      1 0
      0
      1
    out: |
      1

extend:
  - type: Text
    path: "./a"
    in: /in/*.txt
    out: /out/*.txt
