---
type: Batch
timelimit: 2s
match: Lines

cases:
  - name: sample1
    in: |
      4 4 10
      1 2 3
      2 4 5
      1 3 7
      3 4 2
    out: |
      8
  - name: sample2
    in: |
      3 2 5
      1 2 3
      2 3 4
    out: |
      -1
  - name: sample3
    in: |
      6 8 15
      1 2 4
      1 3 2
      2 4 5
      3 4 3
      2 5 7
      4 5 1
      4 6 8
      5 6 2
    out: |
      8

extend:
  - type: Text
    path: "./d"
    in: /in/*.txt
    out: /out/*.txt
