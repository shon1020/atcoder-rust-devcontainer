---
type: Batch
timelimit: 2s
match: Lines

cases:
  - name: sample1
    in: |
      5 3 18 22
      15 18 25 21 30
    out: |
      3
  - name: sample2
    in: |
      4 2 0 0
      -5 7 0 3
    out: |
      3
  - name: sample3
    in: |
      8 5 -2 4
      -10 -2 0 3 5 8 -1 12
    out: |
      1
  - name: sample4
    in: |
      18 10 100 130
      80 95 99 100 101 110 120 130 131 140 150 70 85 128 129 90 105 160
    out: |
      2
  - name: sample5
    in: |
      1 1 -1000000000 -1000000000
      1000000000
    out: |
      2000000000

extend:
  - type: Text
    path: "./b"
    in: /in/*.txt
    out: /out/*.txt
